services:

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: allam
      POSTGRES_PASSWORD: allam123
      POSTGRES_DB: allamdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U allam -d allamdb"]
      interval: 5s
      retries: 5

  # llama-server's built-in -hf downloader hangs for this repo, so fetch the
  # GGUF with plain curl first and have llama-server load it from disk
  # instead of downloading it itself. No resume (-C -): these signed CDN
  # redirect URLs don't reliably support range resumption and silently
  # produce a corrupted file when resumed after an interrupted transfer.
  # The transfer has also been observed to truncate silently (curl exits 0
  # with fewer bytes than Content-Length) on this multi-GB download, so
  # verify the final size and retry (bounded) instead of trusting one
  # attempt. Skips entirely if a complete file is already in the volume.
  model-fetch:
    image: curlimages/curl:latest
    user: root
    entrypoint: ["/bin/sh", "-c"]
    volumes:
      - llm_models:/models
    command: >
      i=0;
      while [ "$(stat -c %s /models/allam.gguf 2>/dev/null || echo 0)" != "4263194400" ] && [ $i -lt 5 ]; do
        i=$((i+1));
        echo "Download attempt $i...";
        curl -L --fail --create-dirs -o /models/allam.gguf https://huggingface.co/bartowski/ALLaM-AI_ALLaM-7B-Instruct-preview-GGUF/resolve/main/ALLaM-AI_ALLaM-7B-Instruct-preview-Q4_K_M.gguf;
      done;
      if [ "$(stat -c %s /models/allam.gguf 2>/dev/null || echo 0)" != "4263194400" ]; then
        echo "Download incomplete after $i attempts"; exit 1;
      fi;
      echo "Model ready.";

  # Self-hosted CPU inference for ALLaM via a quantized GGUF build.
  # First start downloads the model (~4GB) before it starts serving;
  # `web` will get connection errors until `docker compose logs llm` shows
  # it listening on port 8080.
  llm:
    image: ghcr.io/ggml-org/llama.cpp:server
    volumes:
      - llm_models:/models
    command: >
      -m /models/allam.gguf
      --host 0.0.0.0
      --port 8080
      -c 4096
    ports:
      - "8080:8080"
    depends_on:
      model-fetch:
        condition: service_completed_successfully

  web:
    build: .
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://allam:allam123@db:5432/allamdb
      HF_TOKEN: ${HF_TOKEN:-}
      HF_ENDPOINT_URL: ${HF_ENDPOINT_URL:-http://llm:8080}
    depends_on:
      db:
        condition: service_healthy
      llm:
        condition: service_started

volumes:
  pgdata:
  llm_models: