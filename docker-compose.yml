services:

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: allam
      POSTGRES_PASSWORD: allam123
      POSTGRES_DB: allamdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U allam -d allamdb"]
      interval: 5s
      retries: 5

  # Plain curl kept silently truncating this multi-GB download (it's served
  # via HF's chunked Xet/CAS storage, which curl doesn't reconstruct as
  # reliably as HF's own tooling). Use huggingface_hub's official
  # downloader instead - it understands that protocol and resumes properly
  # - wrapped in a bounded retry loop with a final size check as a safety
  # net. Skips entirely if a complete file is already in the volume.
  model-fetch:
    image: python:3.12-slim
    user: root
    entrypoint: ["/bin/sh", "-c"]
    volumes:
      - llm_models:/models
    command:
      - |
        set -e
        if [ "$(stat -c %s /models/allam.gguf 2>/dev/null || echo 0)" = "4263194400" ]; then
          echo "Model already present, skipping download."
        else
          pip install --quiet --no-cache-dir -U "huggingface_hub[cli]"
          i=0
          while [ "$(stat -c %s /models/allam.gguf 2>/dev/null || echo 0)" != "4263194400" ] && [ $$i -lt 3 ]; do
            i=$$((i+1))
            echo "Download attempt $$i..."
            hf download bartowski/ALLaM-AI_ALLaM-7B-Instruct-preview-GGUF ALLaM-AI_ALLaM-7B-Instruct-preview-Q4_K_M.gguf --local-dir /models
            mv -f /models/ALLaM-AI_ALLaM-7B-Instruct-preview-Q4_K_M.gguf /models/allam.gguf 2>/dev/null || true
          done
          if [ "$(stat -c %s /models/allam.gguf 2>/dev/null || echo 0)" != "4263194400" ]; then
            echo "Download incomplete after $$i attempts"
            exit 1
          fi
          echo "Model ready."
        fi

  # Self-hosted CPU inference for ALLaM via a quantized GGUF build.
  # First start downloads the model (~4GB) before it starts serving;
  # `web` will get connection errors until `docker compose logs llm` shows
  # it listening on port 8080.
  llm:
    image: ghcr.io/ggml-org/llama.cpp:server
    volumes:
      - llm_models:/models
    command: >
      -m /models/allam.gguf
      --host 0.0.0.0
      --port 8080
      -c 4096
    ports:
      - "8080:8080"
    depends_on:
      model-fetch:
        condition: service_completed_successfully

  web:
    build: .
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://allam:allam123@db:5432/allamdb
      HF_TOKEN: ${HF_TOKEN:-}
      HF_ENDPOINT_URL: ${HF_ENDPOINT_URL:-http://llm:8080}
    depends_on:
      db:
        condition: service_healthy
      llm:
        condition: service_started

volumes:
  pgdata:
  llm_models: